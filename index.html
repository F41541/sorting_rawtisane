<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Tisane - Sortir & Kategori Stok</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { text-align: center; color: #2c3e50; }
        p { text-align: center; font-size: 14px; color: #555; }
        .container { display: flex; flex-direction: column; gap: 15px; }
        textarea {
            width: 100%; height: 250px; padding: 15px;
            font-size: 14px; border: 1px solid #ccc;
            border-radius: 8px; resize: vertical; box-sizing: border-box;
        }
        button {
            background-color: #27ae60; color: white; padding: 12px 20px;
            font-size: 16px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background-color: #219150; }
        
        /* CSS BARU UNTUK KOTAK HASIL BERWARNA */
        .output-box {
            width: 100%; height: 250px; padding: 15px; font-size: 14px; 
            border: 1px solid #ccc; border-radius: 8px; background-color: #fff; 
            overflow-y: auto; box-sizing: border-box; 
            white-space: pre-wrap; /* Agar spasi dan enter terbaca */
        }
        /* Dekorasi Warna */
        .angka-highlight { color: #d35400; font-weight: bold; font-size: 15px; } /* Warna Oranye Kemerahan */
        .judul-kategori { color: #2980b9; font-weight: bold; } /* Warna Biru */
    </style>
</head>
<body>

    <h1>Pemroses Data Stok Raw Tisane</h1>
    <p>Masukkan pesan dari WhatsApp. Sistem akan membersihkan data, mengelompokkan berdasarkan kategori (~Kategori~), dan mengurutkan A-Z di masing-masing kategori.</p>

    <div class="container">
        <textarea id="inputData" placeholder="Tempel (Paste) pesan WhatsApp di sini..."></textarea>
        <button onclick="prosesData()">Bersihkan, Kelompokkan & Urutkan</button>
        
        <div id="outputData" class="output-box">Hasil yang sudah bersih, terkelompok, dan urut akan muncul di sini...</div>
        
        <button id="btnSalin" onclick="salinHasil()" style="background-color: #3498db;">📋 Salin Hasil</button>
    </div>

    <script>
        function prosesData() {
            const inputData = document.getElementById("inputData").value;
            const lines = inputData.split('\n');
            
            // Variabel untuk menyimpan data per kategori ("Folder" penyimpanan)
            let categories = {};
            let currentCategory = "RAW TISANE"; // Kategori bawaan

            const regexWA = /^\[.*?\]\s*.*?\:\s*/;
            const kataDihapus = [
                "shopee", "lazada", "tokopedia", "tiktok", "jnt", "spx", 
                "jne", "j\\&t", "kargo", "cargo", "express", "raw tisane", "tea house", "standar", "standard"
            ];

            // Looping baris per baris
            for (let i = 0; i < lines.length; i++) {
                let baris = lines[i];

                // 1. Cek Pesan Baru WA (Reset ke RAW TISANE)
                if (regexWA.test(baris)) {
                    currentCategory = "RAW TISANE";
                    baris = baris.replace(regexWA, '');
                }

                // 2. Cek apakah ini judul Kategori (mengandung tanda ~)
                // Kita tangkap teks yang ada di antara tanda ~
                let matchKategori = baris.match(/~+(.*?)~+/);
                if (matchKategori) {
                    currentCategory = matchKategori[1].trim(); // Pindah "Folder"
                    continue; // Lanjut ke baris selanjutnya, judul tidak perlu diproses sebagai produk
                }

                // 3. Pembersihan Kata (Hapus marketplace/kurir)
                kataDihapus.forEach(kata => {
                    const regexKata = new RegExp(kata, "gi"); // g = global, i = abaikan huruf besar/kecil
                    baris = baris.replace(regexKata, ' ');
                });

                // Bersihkan simbol kurung (), koma ,, dan simbol ampersand &
                baris = baris.replace(/[(),&]/g, ' ');
                
                // Hapus huruf "x" atau "X" yang berdiri sendiri (sebagai tanda kali)
                // \b memastikan kita tidak sengaja menghapus huruf x di dalam kata (seperti "Extra")
                baris = baris.replace(/\b[xX]\b/g, ' ');
                baris = baris.replace(/\s[xX]\s/g, ' ');

                // Menghapus semua teks di dalam tanda bintang *...* beserta bintangnya
                baris = baris.replace(/\*.*?\*/g, '');

                // Bersihkan spasi ganda dan spasi di awal/akhir
                baris = baris.replace(/\s+/g, ' ').trim();

                // 4. Pisahkan Nama Produk dan Angka (Jumlahnya), lalu rekap ke "Folder"
                if (baris !== '') {
                    // Siapkan folder kategori jika belum ada (sekarang pakai Object {} agar bisa merekap)
                    if (!categories[currentCategory]) {
                        categories[currentCategory] = {}; 
                    }

                    // Cari angka di paling belakang kalimat
                    // (.+?) artinya ambil nama produk, \s+(\d+)$ artinya ambil angka di spasi terakhir
                    let match = baris.match(/(.+?)\s+[xX]?\s*(\d+)$/);
                    let namaProduk = baris;
                    let jumlah = 1; // Kalau kebetulan nggak ada angka di belakangnya, kita anggap jumlahnya 1

                    if (match) {
                        namaProduk = match[1].trim(); // Ambil nama tehnya saja
                        jumlah = parseInt(match[2], 10); // Ubah teks angka jadi angka matematika murni
                    }

                    // REKAP: Kalau produk sudah ada di folder, tambahkan angkanya. Kalau belum, buat baru.
                    if (categories[currentCategory][namaProduk]) {
                        categories[currentCategory][namaProduk] += jumlah;
                    } else {
                        categories[currentCategory][namaProduk] = jumlah;
                    }
                }
            }

            // 5. Susun, Urutkan (A-Z), dan Cetak Output Akhir
            let hasilAkhir = [];
            
            // Buka setiap folder kategori yang ada
            for (let kategori in categories) {
                // Tulis judul kategorinya dengan kode warna (HTML)
                hasilAkhir.push(`<span class="judul-kategori">~ ${kategori} ~</span>`);

                // Ambil daftar nama produk di kategori ini, lalu urutkan A-Z
                let daftarProduk = Object.keys(categories[kategori]);
                daftarProduk.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
                
                // Gabungkan kembali nama produk dengan TOTAL angkanya dengan kode warna
                for (let i = 0; i < daftarProduk.length; i++) {
                    let produk = daftarProduk[i];
                    let totalJumlah = categories[kategori][produk];
                    hasilAkhir.push(`${produk} <span class="angka-highlight">${totalJumlah}</span>`);
                }
                
                // Tambahkan jarak spasi (baris kosong) antar kategori agar rapi
                hasilAkhir.push(""); 
            }

            // Tampilkan hasil gabungan ke kotak div di bawah menggunakan innerHTML
            document.getElementById("outputData").innerHTML = hasilAkhir.join('<br>');
        }
        
        // FUNGSI BARU UNTUK MENYALIN TEKS
        function salinHasil() {
            // MENGGUNAKAN innerText AGAR WARNA TIDAK IKUT KESALIN KE SPREADSHEET
            const teksHasil = document.getElementById("outputData").innerText;
            const tombolSalin = document.getElementById("btnSalin");

            // Cek apakah kotaknya masih kosong atau berisi teks bawaan
            if (teksHasil.trim() === "" || teksHasil.includes("Hasil yang sudah bersih")) {
                alert("Belum ada data yang diproses untuk disalin!");
                return; // Hentikan proses kalau kosong
            }

            // Perintah ajaib untuk menyalin ke clipboard (papan klip)
            navigator.clipboard.writeText(teksHasil).then(() => {
                // Ubah tampilan tombol agar kita tahu sudah berhasil disalin
                tombolSalin.innerHTML = "✅ Berhasil Disalin!";
                tombolSalin.style.backgroundColor = "#27ae60"; // Warnanya jadi hijau

                // Kembalikan tombol ke bentuk semula setelah 2 detik
                setTimeout(() => {
                    tombolSalin.innerHTML = "📋 Salin Hasil";
                    tombolSalin.style.backgroundColor = "#3498db"; // Balik ke warna biru
                }, 2000);
            }).catch(err => {
                // Kalau browsernya tidak mendukung atau error
                alert("Gagal menyalin: " + err);
            });
        }
    </script>

</body>
</html>
