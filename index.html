<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Tisane - Sortir & Kategori Stok</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { text-align: center; color: #2c3e50; }
        p { text-align: center; font-size: 14px; color: #555; }
        .container { display: flex; flex-direction: column; gap: 15px; }
        textarea {
            width: 100%; height: 250px; padding: 15px;
            font-size: 14px; border: 1px solid #ccc;
            border-radius: 8px; resize: vertical; box-sizing: border-box;
        }
        button {
            background-color: #27ae60; color: white; padding: 12px 20px;
            font-size: 16px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background-color: #219150; }
    </style>
</head>
<body>

    <h1>Pemroses Data Stok Raw Tisane</h1>
    <p>Masukkan pesan dari WhatsApp. Sistem akan membersihkan data, mengelompokkan berdasarkan kategori (~Kategori~), dan mengurutkan A-Z di masing-masing kategori.</p>

    <div class="container">
        <textarea id="inputData" placeholder="Tempel (Paste) pesan WhatsApp di sini..."></textarea>
        <button onclick="prosesData()">Bersihkan, Kelompokkan & Urutkan</button>
        <textarea id="outputData" placeholder="Hasil yang sudah bersih, terkelompok, dan urut akan muncul di sini..." readonly></textarea>
    </div>

    <script>
        function prosesData() {
            const inputData = document.getElementById("inputData").value;
            const lines = inputData.split('\n');
            
            // Variabel untuk menyimpan data per kategori ("Folder" penyimpanan)
            let categories = {};
            let currentCategory = "PRODUK UTAMA"; // Kategori bawaan

            const regexWA = /^\[.*?\]\s*.*?\:\s*/;
            const kataDihapus = [
                "shopee", "lazada", "tokopedia", "tiktok", "jnt", "spx", 
                "jne", "j\\&t", "kargo", "cargo", "express", "raw tisane", "tea house"
            ];

            // Looping baris per baris
            for (let i = 0; i < lines.length; i++) {
                let baris = lines[i];

                // 1. Cek Pesan Baru WA (Reset ke Produk Utama)
                if (regexWA.test(baris)) {
                    currentCategory = "PRODUK UTAMA";
                    baris = baris.replace(regexWA, '');
                }

                // 2. Cek apakah ini judul Kategori (mengandung tanda ~)
                // Kita tangkap teks yang ada di antara tanda ~
                let matchKategori = baris.match(/~+(.*?)~+/);
                if (matchKategori) {
                    currentCategory = matchKategori[1].trim(); // Pindah "Folder"
                    continue; // Lanjut ke baris selanjutnya, judul tidak perlu diproses sebagai produk
                }

                // 3. Pembersihan Kata (Hapus marketplace/kurir)
                kataDihapus.forEach(kata => {
                    const regexKata = new RegExp(kata, "gi"); // g = global, i = abaikan huruf besar/kecil
                    baris = baris.replace(regexKata, ' ');
                });

                // Bersihkan simbol kurung () dan koma yang tersisa dari sisa hapusan keyword
                baris = baris.replace(/[(),]/g, ' ');

                // Hapus huruf "x " (untuk tanda kali)
                // \b[xX]\s+ artinya mencari huruf x yang berdiri sendiri diikuti spasi
                baris = baris.replace(/\b[xX]\s+/g, ' ');

                // Bersihkan spasi ganda dan spasi di awal/akhir
                baris = baris.replace(/\s+/g, ' ').trim();

                // 4. Masukkan produk ke dalam "Folder" kategorinya masing-masing
                if (baris !== '') {
                    // Jika folder kategori belum ada, buat foldernya dulu
                    if (!categories[currentCategory]) {
                        categories[currentCategory] = [];
                    }
                    // Masukkan produk ke dalam folder tersebut
                    categories[currentCategory].push(baris);
                }
            }

            // 5. Susun dan Urutkan (A-Z) untuk Output Akhir
            let hasilAkhir = [];
            
            // Ambil semua nama "folder" yang sudah dibuat
            for (let kategori in categories) {
                // Urutkan isi dalam folder tersebut (A-Z)
                categories[kategori].sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
                
                // Tulis judul kategorinya
                hasilAkhir.push(`~ ${kategori} ~`);
                
                // Tulis daftar produknya yang sudah urut
                hasilAkhir.push(categories[kategori].join('\n'));
                
                // Tambahkan jarak spasi (baris kosong) antar kategori agar rapi
                hasilAkhir.push(""); 
            }

            // Tampilkan hasil gabungan ke kotak teks di bawah
            document.getElementById("outputData").value = hasilAkhir.join('\n').trim();
        }
    </script>

</body>
</html>
